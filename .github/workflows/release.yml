name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS Release
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build macOS Application
        run: |
          chmod +x bundle_macos.sh
          ./bundle_macos.sh

      - name: Package macOS Application
        run: |
          cd target/release
          zip -r ../../huemidity-macos.zip HueMIDIty.app
          cd ../..

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: huemidity-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows Release
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Windows Application
        run: |
          cargo build --release

      - name: Package Windows Application
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/huemidity.exe -DestinationPath huemidity-windows.zip

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: huemidity-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
